<!DOCTYPE html>
<html>
<head>
    <title>Admin Settings</title>

    <style>
        body {
            margin:0;
            font-family: 'Poppins', sans-serif;
            background:#0f172a;
            color:white;
        }

        /* Sidebar */
        .sidebar {
            width:220px;
            height:100vh;
            position:fixed;
            background:#020617;
            padding-top:20px;
        }

        .sidebar a {
            display:block;
            padding:12px 18px;
            color:#cbd5f5;
            text-decoration:none;
            transition:0.3s;
        }

        .sidebar a:hover {
            background:#22c55e;
            color:white;
        }

        /* Main */
        .main {
            margin-left:220px;
            padding:30px;
        }

        h1 {
            margin-bottom:20px;
        }

        /* Card */
        .card {
            background:#1e293b;
            padding:25px;
            border-radius:12px;
            width:400px;
            box-shadow:0 0 15px rgba(0,0,0,0.4);
        }

        label {
            display:block;
            margin-top:15px;
            font-size:14px;
            color:#94a3b8;
        }

        input {
            width:100%;
            padding:10px;
            margin-top:5px;
            border-radius:6px;
            border:none;
            outline:none;
            background:#0f172a;
            color:white;
        }

        input:focus {
            border:1px solid #22c55e;
        }

        button {
            margin-top:20px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#22c55e;
            color:white;
            font-size:15px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover {
            background:#16a34a;
        }

        .message {
            margin-bottom:15px;
            padding:10px;
            background:#064e3b;
            border-radius:6px;
            color:#22c55e;
        }
    </style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a>
    <a href="{{ url_for('admin_users') }}">👥 Users</a>
    <a href="{{ url_for('admin_analytics') }}">📈 Analytics</a>
    <a href="{{ url_for('admin_reports') }}">📝 Reports</a>
    <a href="{{ url_for('admin_settings') }}">⚙️ Settings</a>
    <a href="{{ url_for('admin_logout') }}">🚪 Logout</a>
</div>

<!-- Main -->
<div class="main">

    <h1>⚙️ Admin Settings</h1>

    <div class="card">

        {% if message %}
        <div class="message">{{ message }}</div>
        {% endif %}

        <form method="POST">

            <label>Username</label>
            <input type="text" name="username" value="{{ admin.username }}" required>

            <label>Password (leave blank to keep current)</label>
            <input type="password" name="password">

            <label>Current Password</label>
<input type="password" name="current_password" required>

            <button type="submit">Update Settings</button>

        </form>

    </div>

</div>

</body>
</html>
