<!DOCTYPE html>
<html>
<head>
    <title>Admin Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Poppins, sans-serif; background:#0f172a; color:white; margin:0; }
        .sidebar { width:220px; height:100vh; position:fixed; background:#020617; padding-top:20px; }
        .sidebar a { display:block; padding:12px; color:white; text-decoration:none; }
        .sidebar a:hover { background:#22c55e; }
        .main { margin-left:220px; padding:20px; }
        .card { display:inline-block; background:#1e293b; padding:15px; margin:10px; border-radius:8px; width:200px; text-align:center; }
        /* 🔷 CHART GRID */
.charts{
    display:flex;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
}

/* 🔷 EACH GRAPH BOX */
.chart-box{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    width:300px;   /* 🔥 size control */
    height:300px;
    text-align:center;
}

/* 🔷 CANVAS SIZE */
.chart-box canvas{
    width:100% !important;
    height:220px !important;
}
    </style>
</head>
<body>

<div class="sidebar">
    <a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a>
    <a href="{{ url_for('admin_users') }}">👥 Users</a>
    <a href="{{ url_for('admin_analytics') }}">📈 Analytics</a> 
    <a href="{{ url_for('admin_logout') }}">🚪 Logout</a>
</div>

<div class="main">
    <h1>📈 Analytics</h1>

    <!-- 🔹 Cards -->
    <div class="card">
        <h3>Total Users</h3>
        <p>{{ total_users }}</p>
    </div>
    <div class="card">
        <h3>Total Predictions</h3>
        <p>{{ total_predictions }}</p>
    </div>
    <div class="card">
        <h3>Most Predicted Digit</h3>
        <p>{{ most_digit }}</p>
    </div>
    <div class="card">
        <h3>Highest Confidence</h3>
        <p>{{ highest_conf }}%</p>
    </div>

    <!-- 🔹 Graph -->
   <h2>📊 Analytics Graphs</h2>

<div class="charts">

    <div class="chart-box">
        <h3>Bar Chart</h3>
        <canvas id="barChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>Pie Chart</h3>
        <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>Line Chart</h3>
        <canvas id="lineChart"></canvas>
    </div>

</div>

<script>
let digits = {{ digits|tojson }};
let counts = {{ counts|tojson }};

// 🔵 BAR CHART
new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: digits,
        datasets: [{
            label: 'Digit Count',
            data: counts,
            backgroundColor: '#22c55e'
        }]
    }
});

// 🟣 PIE CHART
new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: digits,
        datasets: [{
            data: counts
        }]
    }
});

// 🟡 LINE CHART
new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
        labels: digits,
        datasets: [{
            label: 'Trend',
            data: counts,
            borderColor: '#3b82f6',
            fill: false
        }]
    }
});
</script>

</body>
</html>
