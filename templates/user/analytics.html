<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body{
            margin:0;
            font-family:Poppins;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
        }

        /* 🔷 NAVBAR */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(10px);
        }

        .navbar-title{
            font-size:22px;
            font-weight:bold;
            text-align:center;
            flex:1;
        }

        .navbar-right button{
            background:#22c55e;
            padding:8px 15px;
            border-radius:20px;
            border:none;
            color:white;
            cursor:pointer;
        }

        /* 🔷 FILTER SECTION */
        .filters{
            display:flex;
            justify-content:center;
            gap:20px;
            margin:30px 20px;
            flex-wrap:wrap;
        }

        .filters select, .filters input[type="date"], .filters button{
            padding:8px 12px;
            border-radius:8px;
            border:none;
            font-size:14px;
        }

        .filters button{
            background:#22c55e;
            color:white;
            cursor:pointer;
        }

        /* 🔹 MAIN CARDS */
        .cards{
            display:flex;
            justify-content:center;
            gap:20px;
            margin:40px 20px 60px 20px;
            flex-wrap:wrap;
        }

        .card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            padding:20px;
            border-radius:15px;
            width:200px;
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
            background:rgba(255,255,255,0.15);
        }

        .card h4{
            margin:10px 0;
            color:#a1a1aa;
        }

        .card h3{
            margin:10px 0;
            color:#22c55e;
        }

        /* 🔹 CHARTS */
        .charts{
            display:flex;
            justify-content:center;
            gap:40px;
            flex-wrap:wrap;
            margin-bottom:60px;
        }

        canvas{
            background:white;
            padding:10px;
            border-radius:10px;
        }

        /* 🔹 EXPORT BUTTON */
        .export-btn{
            display:block;
            margin:10px auto 50px auto;
            background:#3b82f6;
            padding:10px 20px;
            border-radius:15px;
            border:none;
            color:white;
            cursor:pointer;
            font-weight:bold;
        }

        /* 🔹 FOOTER */
        .footer{
            text-align:center;
            padding:20px;
            opacity:0.7;
        }
    </style>
</head>

<body>

<!-- 🔷 NAVBAR -->
<div class="navbar">
    <div class="navbar-left"></div>
    <div class="navbar-title">📊 Analytics Dashboard</div>
    <div class="navbar-right">
        <a href="/dashboard"><button>⬅ Dashboard</button></a>
    </div>
</div>

<!-- 🔷 FILTER SECTION -->
<div class="filters">
    <select id="filterType">
        <option value="all">All Types</option>
        <option value="draw">Draw</option>
        <option value="image">Image</option>
        <option value="voice">Voice</option>
    </select>

    <input type="date" id="startDate" placeholder="Start Date">
    <input type="date" id="endDate" placeholder="End Date">

    <button onclick="applyFilters()">Apply Filter</button>
</div>

<!-- 🔹 CARDS -->
<div class="cards">
    <div class="card">
        <h4>Total Predictions</h4>
        <h3>{{ total }}</h3>
    </div>

    <div class="card">
        <h4>Most Predicted</h4>
        <h3>{{ most_digit }}</h3>
    </div>

    <div class="card">
        <h4>Accuracy</h4>
        <h3>{{ accuracy }}%</h3>
    </div>
</div>

<!-- 🔹 CHARTS -->
<div class="charts">
    <div>
        <h4 style="text-align:center;">Digit Frequency</h4>
        <canvas id="barChart" width="300" height="300"></canvas>
    </div>

    <div>
        <h4 style="text-align:center;">Prediction Distribution</h4>
        <canvas id="pieChart" width="300" height="300"></canvas>
    </div>
</div>

<!-- 🔹 EXPORT BUTTON -->
<button class="export-btn" onclick="exportCharts()">Export Charts PNG</button>

<!-- 🔹 FOOTER -->
<div class="footer">
    © 2026 AI Digit Recognition | Project 🚀
</div>

<script>
// DATA from backend
let digits = {{ digits | tojson }};
let counts = {{ counts | tojson }};

// 🔹 BAR CHART
let barChart = new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: digits,
        datasets: [{
            label: 'Predictions',
            data: counts,
            backgroundColor: '#22c55e'
        }]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{display:false}
        },
        scales:{
            y:{beginAtZero:true}
        }
    }
});

// 🔹 PIE CHART
let pieChart = new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: digits,
        datasets: [{
            data: counts,
            backgroundColor: [
                '#22c55e','#3b82f6','#f59e0b','#ef4444','#a855f7',
                '#14b8a6','#f43f5e','#eab308','#6366f1','#10b981'
            ]
        }]
    },
    options:{responsive:true}
});

// 🔹 FILTER FUNCTION - Reload page with filters applied
function applyFilters(){
    let type = document.getElementById("filterType").value;
    let start = document.getElementById("startDate").value;
    let end = document.getElementById("endDate").value;

    // Build query string
    let params = new URLSearchParams();
    if (type !== 'all') params.append('type', type);
    if (start) params.append('start', start);
    if (end) params.append('end', end);
    
    // Reload page with parameters (optional - or you can use AJAX)
    if (params.toString()) {
        window.location.href = '/analytics?' + params.toString();
    }
}

// 🔹 EXPORT CHARTS FUNCTION
function exportCharts(){
    // Export bar chart
    let barLink = document.createElement('a');
    barLink.href = barChart.toBase64Image();
    barLink.download = 'bar_chart.png';
    barLink.click();

    // Export pie chart
    let pieLink = document.createElement('a');
    pieLink.href = pieChart.toBase64Image();
    pieLink.download = 'pie_chart.png';
    pieLink.click();
}
</script>

</body>
</html>
