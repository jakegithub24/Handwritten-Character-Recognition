<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Poppins;
            padding:20px;
            text-align:center;
        }

        /* 🔹 NAVBAR */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(10px);
            margin-bottom:30px;
        }

        .navbar-title{
            font-size:22px;
            font-weight:bold;
            flex:1;
            text-align:center;
        }

        .navbar-right button{
            background:#22c55e;
            padding:8px 15px;
            border-radius:20px;
            border:none;
            color:white;
            cursor:pointer;
        }

        h2{
            margin-bottom:30px;
        }

        .cards-container{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
            margin-bottom:40px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            width:220px;
            border-radius:12px;
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            background:rgba(255,255,255,0.1);
        }

        button{
            padding:10px 15px;
            background:#22c55e;
            border:none;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            margin-top:20px;
        }

        .sub-card{
            background:#111827;
            padding:10px;
            border-radius:8px;
            margin:10px 0;
        }

    </style>
</head>

<body>

<!-- 🔹 NAVBAR -->
<div class="navbar">
    <div class="navbar-left"></div>
    <div class="navbar-title">📄 Prediction Reports</div>
    <div class="navbar-right">
        <a href="/dashboard"><button>⬅ Dashboard</button></a>
    </div>
</div>



<div class="cards-container">

    <div class="card">
        <h3>Total Predictions</h3>
        <p>{{ total }}</p>
    </div>

    <div class="card">
        <h3>Top Digit</h3>
        <p>{{ top_digit }}</p>
    </div>

    <div class="card">
        <h3>Accuracy</h3>
        <p>{{ accuracy }}%</p>
    </div>

    <div class="card">
        <h3>Average Confidence</h3>
        <p>{{ avg_confidence }}%</p>
    </div>

    <div class="card">
        <h3>Prediction Type Breakdown</h3>
        <div class="sub-card">Draw: {{ draw_count }}</div>
        <div class="sub-card">Image: {{ image_count }}</div>
        <div class="sub-card">Voice: {{ voice_count }}</div>
    </div>

</div>

<a href="/download_report">
    <button>Download PDF Report</button>
</a>

</body>
</html>
