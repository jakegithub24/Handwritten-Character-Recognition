<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Poppins;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

/* 🔷 NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

.logo{
    font-size:22px;
    font-weight:bold;
}

/* User info + dropdown */
.user-dropdown{
    position: relative;
    display: inline-block;
}

.user-dropdown button{
    background:#22c55e;
    padding:8px 15px;
    border-radius:20px;
    border:none;
    color:white;
    cursor:pointer;
}

.user-dropdown-content{
    display: none;
    position: absolute;
    right: 0;
    background-color: #1e293b;
    min-width: 120px;
    box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
    border-radius:10px;
    z-index: 1;
}

.user-dropdown-content a{
    color: white;
    padding: 10px 15px;
    text-decoration: none;
    display: block;
}

.user-dropdown-content a:hover{
    background-color: #22c55e;
    color:white;
}

.user-dropdown:hover .user-dropdown-content{
    display: block;
}

/* 🔷 MAIN */
.main{
    text-align:center;
    margin-top:40px;
}

.main h1{
    font-size:32px;
}

/* 🔷 GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
    gap:20px;
    padding:40px;
}

/* 🔷 CARD */
.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    background:rgba(255,255,255,0.15);
}

.card h3{
    margin-bottom:10px;
}

button{
    margin-top:10px;
    padding:10px;
    width:100%;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* 🔷 FOOTER */
.footer{
    text-align:center;
    padding:20px;
    margin-top:20px;
    opacity:0.7;
}
</style>

</head>

<body>

<!-- 🔷 NAVBAR -->
<!-- 🔷 NAVBAR -->
<div class="navbar">
    <div class="logo">🤖 AI Digit Recognition</div>

    <!-- Dashboard Button -->
    <a href="/dashboard">
        <button style="padding:6px 12px; font-size:14px; border-radius:10px; margin-right:10px;">🏠 Dashboard</button>
    </a>

    <!-- User Dropdown -->
    <div class="user-dropdown">
        <button>👤 {{ user.name }}</button>
        <div class="user-dropdown-content">
            <a href="/profile">Profile</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
</div>
<!-- 🔷 MAIN -->
<div class="main">
    <h1>Welcome, {{ user.name }} 👋</h1>
    <p>Select a feature to continue</p>
</div>

<!-- 🔷 GRID -->
<div class="grid">

    <div class="card">
        <h3>🧠 Predict</h3>
        <p>Upload / Draw / Voice</p>
        <a href="/predict_page"><button>Open</button></a>
    </div>

    <div class="card">
        <h3>📜 History</h3>
        <a href="/history"><button>View</button></a>
    </div>

    <div class="card">
        <h3>📊 Analytics</h3>
        <a href="/analytics"><button>Open</button></a>
    </div>

    <div class="card">
        <h3>🔥 Top Predictions</h3>
        <a href="/top_predictions"><button>Check</button></a>
    </div>

    <div class="card">
        <h3>📄 Reports</h3>
        <a href="/reports"><button>Open</button></a>
    </div>

    <div class="card">
        <h3>⬇ Download Data</h3>
        <a href="/download"><button>Open</button></a>
    </div>

</div>

<!-- 🔷 FOOTER -->
<div class="footer">
    © 2026 AI Digit Recognition | Project 🚀
</div>

</body>
</html>
