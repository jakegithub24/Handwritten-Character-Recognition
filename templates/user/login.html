<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>



<div class="container">

    <form action="/login" method="post" class="form-box">

        <h2><i class="fa-solid fa-right-to-bracket"></i> Login</h2>

        <p class="tagline">Login to continue 🚀</p>

        <!-- ERROR -->
        {% if error %}
            <div class="success-msg" style="background:#dc2626;">
                ❌ {{ error }}
            </div>
        {% endif %}

        <!-- EMAIL -->
        <div class="input-box">
            <i class="fa fa-envelope"></i>
            <input name="email" type="email" placeholder="Enter Email" required>
        </div>

        <!-- PASSWORD -->
        <div class="input-box">
            <i class="fa fa-lock"></i>
            <input id="password" name="password" type="password" placeholder="Enter Password" required>
            <i class="fa fa-eye toggle-pass" onclick="togglePassword()"></i>
        </div>

        <button type="submit">Login</button>

        <p class="link-text">
            <a href="#">Forgot Password?</a>
        </p>

        <p class="link-text">
            Don't have an account? <a href="/register">Register</a>
        </p>

    </form>

</div>

<!-- JS -->
<script>
function togglePassword() {
    var x = document.getElementById("password");
    var icon = document.querySelector(".toggle-pass");

    if (x.type === "password") {
        x.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        x.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
