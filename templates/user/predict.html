<!DOCTYPE html>
<html>
<head>
    <title>Predict Digit</title>
    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Poppins, sans-serif;
            margin:0;
        }

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:10px 20px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(10px);
        }

        .dashboard-btn{
            padding:6px 12px;
            background:#22c55e;
            border:none;
            color:white;
            border-radius:10px;
            cursor:pointer;
            font-size:14px;
        }

        .title{
            font-size:22px;
            font-weight:bold;
            text-align:center;
            flex:1;
        }

        .user-dropdown{
            position: relative;
            display: inline-block;
        }

        .user-dropdown button{
            background:#22c55e;
            padding:8px 15px;
            border-radius:20px;
            border:none;
            color:white;
            cursor:pointer;
        }

        .user-dropdown-content{
            display: none;
            position: absolute;
            right: 0;
            background-color: #1e293b;
            min-width: 120px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            border-radius:10px;
            z-index:1;
        }

        .user-dropdown-content a{
            color:white;
            padding:10px 15px;
            text-decoration:none;
            display:block;
        }

        .user-dropdown-content a:hover{
            background-color:#22c55e;
        }

        .user-dropdown:hover .user-dropdown-content{
            display:block;
        }

        .main-title{
            text-align:center;
            margin-top:40px;
            font-size:28px;
        }

        .container{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin:40px;
        }

        .box{
            background:#1e293b;
            padding:20px;
            border-radius:15px;
            width:250px;
            aspect-ratio:1/1;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            transition:0.3s;
        }

        .box:hover{
            background:#2c3a59;
            transform:translateY(-5px);
        }

        .box h3{
            margin-bottom:15px;
        }

        button{
            margin-top:10px;
            padding:8px 12px;
            width:100%;
            background:#22c55e;
            border:none;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

        canvas{
            background:white;
            margin-top:10px;
            cursor:crosshair;
        }

        @media screen and (max-width:900px){
            .container{
                flex-direction:column;
                align-items:center;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/dashboard"><button>⬅Dashboard</button></a>
    <div class="title">🕵️‍♂️ Digit Detective </div>
</div>

<div class="main-title">Predict Your Digit</div>

<div class="container">
    <!-- Upload -->
    <div class="box">
        <h3>📤 Upload Image</h3>
        <input type="file" id="file">
        <button onclick="upload()">Predict</button>
    </div>

    <!-- Draw -->
    <div class="box">
    <h3>✍ Draw Digit</h3>
    <canvas id="canvas" width="200" height="200"></canvas>
    <button onclick="predictCanvas()">Predict</button>
    <button onclick="clearCanvas()">Clear</button>
</div>

    <!-- Voice -->
    <div class="box">
        <h3>🎤 Voice Input</h3>
        <div id="voiceStatus" style="font-size: 12px; color: #cbd5f5; margin: 5px 0;">Ready</div>
        <button id="startBtn" onclick="startRecording()" style="background: #22c55e;">Start Recording</button>
        <button id="stopBtn" onclick="stopRecording()" style="background: #ef4444; display: none;">Stop Recording</button>
    </div>
</div>

<h3 id="result" style="text-align:center;"></h3>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Initialize canvas with white background
ctx.fillStyle = "white";
ctx.fillRect(0,0,canvas.width,canvas.height);

// Brush settings
ctx.strokeStyle = "black";
ctx.lineWidth = 15;
ctx.lineCap = "round";

let drawing = false;

// Drawing events
canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
canvas.onmouseleave = () => { drawing = false; ctx.beginPath(); };

canvas.onmousemove = (e) => {
    if(!drawing) return;
    const rect = canvas.getBoundingClientRect();
    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
}

// Clear canvas
function clearCanvas(){
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "black";
    ctx.beginPath();
}

// Predict from canvas
function predictCanvas(){
    let tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = 28;
    tmpCanvas.height = 28;
    let tmpCtx = tmpCanvas.getContext('2d');

    tmpCtx.drawImage(canvas, 0, 0, 28, 28);

    let dataURL = tmpCanvas.toDataURL();

    fetch("/predict_canvas", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({image: dataURL})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
        "Digit: "+data.digit+" | Confidence: "+data.confidence+"%";
    });
}

// Upload image
function upload(){
    let file = document.getElementById("file").files[0];
    if(!file){
        alert("Please select a file");
        return;
    }
    let formData = new FormData();
    formData.append("image", file);

    fetch("/predict", {method:"POST", body:formData})
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("result").innerText =
        "Digit: "+data.digit+" | Confidence: "+data.confidence+"%";
    });
}

// Voice recording variables
let mediaRecorder;
let audioChunks = [];
let recordingStartTime;
let recordingTimer;

// Start recording
async function startRecording(){
    try {
        // Request microphone access with specific audio constraints
        const stream = await navigator.mediaDevices.getUserMedia({ 
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
                sampleRate: 16000
            } 
        });
        
        // Create MediaRecorder with specific options for WAV
        const options = {
            mimeType: 'audio/wav',
            audioBitsPerSecond: 128000
        };
        
        // Fallback if WAV is not supported
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            console.log("WAV not supported, using default");
            mediaRecorder = new MediaRecorder(stream);
        } else {
            mediaRecorder = new MediaRecorder(stream, options);
        }
        
        audioChunks = [];
        recordingStartTime = Date.now();
        
        // Collect audio data
        mediaRecorder.ondataavailable = (event) => {
            console.log("Audio chunk received:", event.data.size);
            audioChunks.push(event.data);
        };
        
        mediaRecorder.onstop = () => {
            console.log("Recording stopped. Total chunks:", audioChunks.length);
            // Create audio blob
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            console.log("Audio blob size:", audioBlob.size);
            sendAudioToBackend(audioBlob);
        };
        
        mediaRecorder.onerror = (event) => {
            console.error("MediaRecorder error:", event.error);
            document.getElementById("result").innerText = "Recording error: " + event.error;
            document.getElementById("voiceStatus").innerText = "Ready";
            document.getElementById("voiceStatus").style.color = "#cbd5f5";
        };
        
        mediaRecorder.start();
        
        // Update UI
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "block";
        document.getElementById("voiceStatus").innerText = "🔴 Recording...";
        document.getElementById("voiceStatus").style.color = "#ef4444";
        
        // Start timer display
        let seconds = 0;
        recordingTimer = setInterval(() => {
            seconds++;
            document.getElementById("voiceStatus").innerText = `🔴 Recording... ${seconds}s`;
        }, 1000);
        
    } catch (err) {
        alert("Microphone access denied or not available: " + err.message);
        console.error("Error accessing microphone:", err);
        document.getElementById("voiceStatus").innerText = "Mic access denied";
        document.getElementById("voiceStatus").style.color = "#ef4444";
    }
}

// Stop recording
function stopRecording(){
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        
        // Stop the audio stream
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
        
        // Clear timer
        clearInterval(recordingTimer);
        
        // Update UI
        document.getElementById("startBtn").style.display = "block";
        document.getElementById("stopBtn").style.display = "none";
        document.getElementById("voiceStatus").innerText = "Processing...";
        document.getElementById("voiceStatus").style.color = "#f59e0b";
    }
}

// Send audio to backend
function sendAudioToBackend(audioBlob){
    console.log("Sending audio blob, size:", audioBlob.size);
    
    let formData = new FormData();
    formData.append("voice", audioBlob, "recording.wav");
    
    fetch("/predict_voice", {
        method: "POST",
        body: formData
    })
    .then(res => {
        console.log("Response status:", res.status);
        return res.json();
    })
    .then(data => {
        console.log("Received data:", data);
        if(data.error) {
            document.getElementById("result").innerText = "Error: " + data.error;
            document.getElementById("voiceStatus").innerText = "Ready";
            document.getElementById("voiceStatus").style.color = "#cbd5f5";
        } else {
            document.getElementById("result").innerText = 
                "Digit: " + data.digit + " | Confidence: " + data.confidence + "%";
            document.getElementById("voiceStatus").innerText = "✅ Done";
            document.getElementById("voiceStatus").style.color = "#22c55e";
        }
    })
    .catch(err => {
        console.error("Error:", err);
        document.getElementById("result").innerText = "Error processing voice: " + err.message;
        document.getElementById("voiceStatus").innerText = "Ready";
        document.getElementById("voiceStatus").style.color = "#cbd5f5";
    });
}
</script>

</body>
</html>
